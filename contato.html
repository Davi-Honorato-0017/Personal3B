    <!-- Ligação do css externo -->
     <link rel="stylesheet" href="css/layout.css">
</head>

<body>
    <main class="pg-container">
        <nav class="menu" id="menu">
            <!-- Divisão -->
             <div class="logo">
                <p>Iron<span>Box</span></p>
            </div>
            <ul>
                <li>
                    <a href="index.html">
                        <i class="bi bi-house"></i>
                        <span> Home</span>
                    </a>
                </li>
                <li><a href="#"><i class="bi bi-house"></i><span> Home</span></a></li>
                <li><a href="#sobre"><i class="bi bi-exclamation-circle"></i><span> Sobre</span></a></li>
                <li><a href="#servico"><i class="bi bi-briefcase"></i><span> Serviços</span></a></li>
                <li><a href="#depoimento"><i class="bi bi-chat-left"></i><span> Depoimentos</span></a></li>
                <li><a href="#"><i class="bi bi-person"></i><span> Contato</span></a></li>
                <li><a href="#"><i class="bi bi-box-arrow-in-right"></i><span> Entrar</span></a></li>
            </ul>

        </nav>
        <div class="conteudo">
            <section class="sessao">
                <h2>Contato</h2>
                <form action="" method="post">
                    <div>
                    <label for="nome">Nome</label>
                    <input type="text" name="nome" id="nome"
                    placeholder="Digite seu nome completo"
                    maxlength="50" title="Digite seu nome aqui" 
                    required>
                    <div>
                        <div>
                            <label for="email">E-mail</label>
                            <input type="email" name="email" id="email"
                            required
                            placeholder="Digite seu e-mail" title="Digite seu e-mail aqui"
                            maxlength="100" title="Digite seu Email aqui">
                        </div>
                        <div>
                            <label for="sexo">Sexo</label>
                            <select name="sexo" id="sexo">
                                <option selected>Seleciona o sexo</option>
                                    <option value="F">Feminino</option>
                                    <option value="M">Masculino</option>   
                                    <option value="D">Bi</option>  
                                    <input type="color" name="" id=""> 
                            </select>
                            
                        </div>
                    
                    <input type="submit" value="Enviar">
                    

                </form>
            </section>
            <section class="sessao">
                <h2>Venha nos visitar</h2>
                <div>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d580.8008883364529!2d-61.17848389417468!3d-11.683986977734897!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x93b7e5cefe348aa5%3A0x7b3a5395f10e5c35!2sR.%20U%2C%2013%20-%20Bnh%2C%20Pimenta%20Bueno%20-%20RO%2C%2076970-000!5e0!3m2!1spt-BR!2sbr!4v1775500108874!5m2!1spt-BR!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </section>
        </div>
    </main>
    <footer class="footer">
        <p class="footer-logo">Iron<span>Box</span></p>
